# docker-compose.staging.yml — override for staging environment
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d
#
# Before deploying:
#   1. Create auth-service/.env.staging from auth-service/.env.example
#   2. Set ALLOWED_ORIGINS and TRUSTED_PROXY_IPS to real staging values
#   3. Replace all placeholder secrets (JWT_SECRET, INTERNAL_SERVICE_KEY, etc.)
#
# TRUSTED_PROXY_IPS must be the internal IP or CIDR of your staging ALB/nginx.
# Obtain it from your cloud console (e.g. AWS EC2 → Load Balancers → Internal IP).

services:
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile.prod
    env_file:
      - ./auth-service/.env.staging
    environment:
      # ── CORS ────────────────────────────────────────────────
      # Override these two vars (or set them in .env.staging).
      # Listed here explicitly so operators know they are required.
      ALLOWED_ORIGINS: '["https://app.oraclous.com","https://studio.oraclous.com"]'
      # ⚠️  Replace with the real ALB internal IP/CIDR before deploying.
      TRUSTED_PROXY_IPS: '["REPLACE_WITH_ALB_INTERNAL_IP_OR_CIDR"]'
    # Remove the volume mount — staging runs from the baked image, not live source
    volumes: []

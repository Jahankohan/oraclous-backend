# Pre-commit hooks for oraclous-data-studio
# Run `pre-commit install` once per clone to enable.
# Run `pre-commit run --all-files` to run all hooks against the whole tree.
#
# Dev install: `pip install -r requirements-dev.txt`

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.11
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: |
          (?x)^(
            \.venv/.*|
            node_modules/.*|
            \.pytest_cache/.*|
            \.ruff_cache/.*|
            \.git/.*|
            .*\.lock|
            .*\.ipynb
          )$

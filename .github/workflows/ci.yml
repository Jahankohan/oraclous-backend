name: CI

on:
  push:
    branches-ignore: ["main"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: knowledge-graph-builder

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint dependencies
        run: pip install ruff black isort

      - name: Run ruff
        run: ruff check app/ tests/

      - name: Check black formatting
        run: black --check app/ tests/

      - name: Check isort
        run: isort --check app/ tests/

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: knowledge-graph-builder

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: knowledge-graph-builder/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create test .env
        run: |
          cat > .env << 'EOF'
          SERVICE_NAME=knowledge-graph-builder-test
          SERVICE_VERSION=1.0.0
          SERVICE_URL=http://localhost:8003
          NEO4J_URI=bolt://localhost:7687
          NEO4J_USERNAME=neo4j
          NEO4J_PASSWORD=testpassword
          NEO4J_DATABASE=neo4j
          POSTGRES_URL=postgresql+asyncpg://testuser:testpass@localhost:5432/testdatabase
          AUTH_SERVICE_URL=http://localhost:8000
          CREDENTIAL_BROKER_URL=http://localhost:8002
          CORE_SERVICE_URL=http://localhost:8001
          REDIS_URL=redis://localhost:6379/0
          CELERY_BROKER_URL=redis://localhost:6379/0
          CELERY_RESULT_BACKEND=redis://localhost:6379/0
          INTERNAL_SERVICE_KEY=test-internal-key
          JWT_SECRET_KEY=test-jwt-secret-key-32-characters-min
          LLM_MODEL=gpt-4o-mini
          OPENAI_API_KEY=
          ANTHROPIC_API_KEY=
          DIFFBOT_API_KEY=
          MAX_CONCURRENT_EXTRACTIONS=2
          BATCH_SIZE=10
          CACHE_TTL=60
          ENABLE_METRICS=false
          LOG_LEVEL=WARNING
          EOF

      - name: Run unit tests
        run: pytest -m unit --tb=short -q

      - name: Generate coverage report
        run: pytest -m unit --cov=app --cov-report=term-missing --cov-report=xml -q
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: knowledge-graph-builder/coverage.xml
          flags: unit-tests
          fail_ci_if_error: false

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build knowledge-graph-builder image
        uses: docker/build-push-action@v5
        with:
          context: knowledge-graph-builder
          file: knowledge-graph-builder/Dockerfile
          push: false
          tags: knowledge-graph-builder:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build auth-service image
        uses: docker/build-push-action@v5
        with:
          context: auth-service
          file: auth-service/Dockerfile.dev
          push: false
          tags: auth-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build credential-broker-service image
        uses: docker/build-push-action@v5
        with:
          context: credential-broker-service
          file: credential-broker-service/Dockerfile
          push: false
          tags: credential-broker-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
